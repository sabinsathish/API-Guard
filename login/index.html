<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecOps Gateway — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070910; --surf: #0f1119; --surf2: #161926; --border: #1e2436;
      --text: #dde3f0; --muted: #7c859e;
      --blue: #4f6ef7; --blue-glow: rgba(79,110,247,.4);
      --green: #10c984; --red: #ef4444; --amber: #f59e0b;
      --mono: 'JetBrains Mono', monospace; --sans: 'Inter', system-ui, sans-serif;
    }
    html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); }

    /* Animated grid background */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(79,110,247,.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(79,110,247,.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; position: relative; z-index: 1; }

    /* Brand */
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
    .brand-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #4f6ef7, #8b5cf6); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; box-shadow: 0 0 24px var(--blue-glow); }
    .brand-text h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -.3px; }
    .brand-text p  { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    /* Card */
    .card {
      width: 100%; max-width: 420px;
      background: rgba(15,17,25,0.7); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 32px 80px rgba(0,0,0,.6), inset 0 1px 1px rgba(255,255,255,0.05);
    }

    /* Tabs */
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 28px; background: var(--bg); border-radius: 10px; padding: 4px; }
    .tab { padding: 9px; border: none; border-radius: 8px; background: transparent; color: var(--muted); font-family: var(--sans); font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .2s; }
    .tab.active { background: var(--surf2); color: var(--text); }

    /* Form */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 7px; letter-spacing: .3px; text-transform: uppercase; }
    input[type=text], input[type=password], select {
      width: 100%; padding: 12px 16px; background: var(--surf2); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px; font-family: var(--sans); font-size: .9rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
    select option { background: var(--surf2); }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 48px; }
    .show-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; }

    .btn-primary {
      width: 100%; padding: 13px; margin-top: 8px;
      background: linear-gradient(135deg, #4f6ef7, #6f4bf7);
      border: none; border-radius: 10px; color: #fff;
      font-family: var(--sans); font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 24px var(--blue-glow);
    }
    .btn-primary:hover { opacity: .92; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    /* Alert */
    .alert { padding: 11px 14px; border-radius: 10px; font-size: .83rem; margin-bottom: 16px; display: none; }
    .alert.show { display: block; }
    .alert.error   { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .alert.success { background: rgba(16,201,132,.12); border: 1px solid rgba(16,201,132,.3); color: #6ee7b7; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: .75rem; color: var(--muted); }

    /* Demo creds */
    .demo-hint { background: rgba(79,110,247,.07); border: 1px solid rgba(79,110,247,.2); border-radius: 10px; padding: 12px 14px; font-size: .8rem; color: var(--muted); }
    .demo-hint code { color: var(--blue); font-family: var(--mono); }

    /* Spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Strength bar */
    .strength-wrap { margin-top: 8px; }
    .strength-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 4px; transition: width .3s, background .3s; }
    .strength-lbl { font-size: .72rem; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>
<div class="page">
  <div class="brand">
    <div class="brand-icon">🛡️</div>
    <div class="brand-text">
      <h1>SecOps Gateway</h1>
      <p>Secure API Gateway · Threat Intelligence Platform</p>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab"        id="tab-reg"   onclick="switchTab('register')">Register</button>
    </div>

    <div id="alert-box" class="alert"></div>

    <!-- ── LOGIN FORM ────────────────────────────────────── -->
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="l-user">Username</label>
        <input id="l-user" type="text" placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="l-pass">Password</label>
        <div class="password-wrap">
          <input id="l-pass" type="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="show-pw" onclick="togglePw('l-pass',this)">👁</button>
        </div>
      </div>
      <button class="btn-primary" id="loginBtn" type="submit">Sign In</button>

      <div class="divider"><span>Demo credentials</span></div>
      <div class="demo-hint">
        Username: <code>admin</code> &nbsp;·&nbsp; Password: <code>Admin@123</code><br>
        <span style="font-size:.72rem;opacity:.7;">Created automatically on first server start</span>
      </div>
    </form>

    <!-- ── REGISTER FORM ─────────────────────────────────── -->
    <form id="registerForm" style="display:none" onsubmit="doRegister(event)">
      <div class="form-group">
        <label for="r-user">Username</label>
        <input id="r-user" type="text" placeholder="Choose a username (3-30 chars)" minlength="3" maxlength="30" required>
      </div>
      <div class="form-group">
        <label for="r-pass">Password</label>
        <div class="password-wrap">
          <input id="r-pass" type="password" placeholder="Min 8 characters" minlength="8" required oninput="checkStrength(this.value)">
          <button type="button" class="show-pw" onclick="togglePw('r-pass',this)">👁</button>
        </div>
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div>
          <div class="strength-lbl" id="strengthLbl">Enter a password</div>
        </div>
      </div>
      <div class="form-group">
        <label for="r-role">Role</label>
        <select id="r-role">
          <option value="viewer">Viewer — Read-only dashboard access</option>
          <option value="analyst">Analyst — Can view threats &amp; logs</option>
          <option value="admin">Admin — Full access</option>
        </select>
      </div>
      <button class="btn-primary" id="registerBtn" type="submit">Create Account</button>
    </form>
  </div>
</div>

<script>
// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-reg').classList.toggle('active',   tab === 'register');
  hideAlert();
}

// ── Alert helpers ─────────────────────────────────────────────────────────────
function showAlert(msg, type = 'error') {
  const el = document.getElementById('alert-box');
  el.textContent = msg;
  el.className = `alert ${type} show`;
}
function hideAlert() {
  document.getElementById('alert-box').className = 'alert';
}

// ── Toggle password visibility ────────────────────────────────────────────────
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// ── Password strength ─────────────────────────────────────────────────────────
function checkStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#ef4444','#f59e0b','#f59e0b','#10c984','#10c984'];
  const labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
  document.getElementById('strengthFill').style.width      = `${score * 20}%`;
  document.getElementById('strengthFill').style.background = colors[score - 1] || '#ef4444';
  document.getElementById('strengthLbl').textContent       = pw ? labels[score - 1] || 'Very Weak' : 'Enter a password';
}

// ── Login ─────────────────────────────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  hideAlert();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;

  try {
    const r = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Login failed');

    // Store JWT and redirect to dashboard
    sessionStorage.setItem('jwt', data.token);
    sessionStorage.setItem('username', data.username);
    sessionStorage.setItem('role', data.role);
    showAlert(`Welcome, ${data.username}! Redirecting…`, 'success');
    setTimeout(() => { window.location.href = '/dashboard/'; }, 800);
  } catch (err) {
    showAlert(err.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// ── Register ──────────────────────────────────────────────────────────────────
async function doRegister(e) {
  e.preventDefault();
  hideAlert();
  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account…';

  const username = document.getElementById('r-user').value.trim();
  const password = document.getElementById('r-pass').value;
  const role     = document.getElementById('r-role').value;

  try {
    const r = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, role })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Registration failed');

    showAlert(`Account "${username}" created! You can now sign in.`, 'success');
    setTimeout(() => switchTab('login'), 1500);
  } catch (err) {
    showAlert(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
