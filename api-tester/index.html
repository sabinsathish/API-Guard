<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecOps — API Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070910; --surf: #0f1119; --surf2: #161926; --border: #1e2436;
      --text: #dde3f0; --muted: #4a5478;
      --blue: #4f6ef7; --green: #10c984; --red: #ef4444; --amber: #f59e0b; --purple: #8b5cf6;
      --mono: 'JetBrains Mono', monospace; --sans: 'Inter', system-ui, sans-serif;
    }
    html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); overflow: hidden; }
    body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(79,110,247,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(79,110,247,.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events:none; }

    /* Layout */
    .shell { display: flex; flex-direction: column; height: 100vh; }
    .topbar { display:flex; justify-content:space-between; align-items:center; padding:12px 24px; background:var(--surf); border-bottom:1px solid var(--border); }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .brand-icon { font-size:1.5rem; }
    h1 { font-size:1.1rem; font-weight:800; }
    .sub { font-size:.75rem; color:var(--muted); }
    .topbar-right { display:flex; gap:10px; }
    .nav-link { color:var(--muted); text-decoration:none; font-size:.82rem; padding:6px 12px; border:1px solid var(--border); border-radius:8px; transition:all .2s; }
    .nav-link:hover { color:var(--text); background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.2); }
    .return-link { display: inline-flex; align-items: center; background: rgba(79,110,247,.1); color: #818cf8 !important; border-color: rgba(79,110,247,.3); font-weight: 600; }
    .return-link:hover { background: rgba(79,110,247,.2); border-color: var(--blue); color: #fff !important; }
    .body-grid { display:grid; grid-template-columns:360px 1fr; flex:1; min-height:0; }

    /* LEFT */
    .left { display:flex; flex-direction:column; gap:14px; padding:18px; overflow-y:auto; border-right:1px solid var(--border); background:var(--surf); }
    .panel { background:var(--surf2); border:1px solid var(--border); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:10px; }
    .panel-title { font-size:.82rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }

    label { font-size:.8rem; color:var(--muted); display:block; margin-bottom:5px; font-weight:600; }
    select, input[type=text], textarea {
      width:100%; padding:10px 12px; background:var(--surf); border:1px solid var(--border);
      color:var(--text); border-radius:8px; font-family:var(--mono); font-size:.82rem; outline:none;
      transition: border-color .2s;
    }
    select:focus, input:focus, textarea:focus { border-color:var(--blue); }
    textarea { resize:vertical; min-height:80px; }

    .route-presets { display:flex; flex-direction:column; gap:5px; }
    .preset-btn {
      padding:8px 12px; background:rgba(255,255,255,.03); border:1px solid var(--border);
      border-radius:8px; color:var(--muted); font-family:var(--mono); font-size:.75rem;
      cursor:pointer; text-align:left; transition:all .15s; display:flex; gap:8px; align-items:center;
    }
    .preset-btn:hover { background:rgba(79,110,247,.1); border-color:var(--blue); color:var(--text); }
    .preset-btn .method { font-size:.68rem; padding:2px 6px; border-radius:4px; font-weight:700; min-width:40px; text-align:center; }
    .method.GET    { background:rgba(16,201,132,.2); color:var(--green); }
    .method.POST   { background:rgba(79,110,247,.2); color:var(--blue); }
    .method.DELETE { background:rgba(239,68,68,.2);  color:var(--red); }

    .send-btn { width:100%; padding:12px; background:linear-gradient(135deg,#4f6ef7,#6f4bf7); border:none; border-radius:10px; color:#fff; font-size:.95rem; font-weight:700; cursor:pointer; transition:opacity .2s; }
    .send-btn:hover { opacity:.9; }
    .send-btn:disabled { opacity:.4; cursor:not-allowed; }

    /* RIGHT */
    .right { display:flex; flex-direction:column; min-height:0; }
    .response-header { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:var(--surf); border-bottom:1px solid var(--border); flex-shrink:0; }
    .resp-meta { display:flex; gap:14px; align-items:center; }
    .status-badge { padding:3px 12px; border-radius:6px; font-family:var(--mono); font-size:.8rem; font-weight:700; }
    .status-badge.ok    { background:rgba(16,201,132,.15); color:var(--green); }
    .status-badge.err   { background:rgba(239,68,68,.15);  color:var(--red); }
    .status-badge.warn  { background:rgba(245,158,11,.15); color:var(--amber); }
    .latency { font-size:.78rem; color:var(--muted); font-family:var(--mono); }
    .clear-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:.8rem; }
    .response-body { flex:1; overflow-y:auto; padding:20px; font-family:var(--mono); font-size:.8rem; line-height:1.8; background:#060810; white-space:pre-wrap; }
    .resp-placeholder { color:var(--muted); text-align:center; padding-top:60px; font-size:.9rem; }

    /* JSON Highlighting */
    .j-key   { color: #7dd3fc; }
    .j-str   { color: #a3e635; }
    .j-num   { color: #fb923c; }
    .j-bool  { color: #f472b6; }
    .j-null  { color:var(--muted); }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand-icon">🧪</span>
      <div><h1>API Tester</h1><p class="sub">Test internal and external API routes</p></div>
    </div>
    <div class="topbar-right">
      <a href="/dashboard/" class="nav-link return-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; margin-bottom: 2px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Return to Dashboard
      </a>
      <a href="/attack/"    class="nav-link">⚔️ Web Attack UI</a>
      <a href="/attacker/"  class="nav-link">🐍 Python Attacker</a>
      <a href="#" onclick="logout(); return false;" class="nav-link">🔑 Logout</a>
    </div>
  </header>

  <div class="body-grid">
    <!-- LEFT: Request Builder -->
    <div class="left">

      <!-- Quick presets -->
      <div class="panel">
        <div class="panel-title">⚡ Quick Routes</div>
        <div class="route-presets">
          <div style="font-size:.72rem; color:var(--muted); font-weight:600; margin-top:4px;">🔧 INTERNAL (port 5000)</div>
          <button class="preset-btn" onclick="loadPreset('GET','/api/internal/products','')"><span class="method GET">GET</span>/api/internal/products</button>
          <button class="preset-btn" onclick="loadPreset('GET','/api/internal/users/public','')"><span class="method GET">GET</span>/api/internal/users/public</button>
          <button class="preset-btn" onclick="loadPreset('GET','/api/internal/profile','')"><span class="method GET">GET</span>/api/internal/profile <small style="color:var(--muted)">(auth)</small></button>
          <button class="preset-btn" onclick='loadPreset("POST","/api/internal/orders",JSON.stringify({productId:3,quantity:2},null,2))'><span class="method POST">POST</span>/api/internal/orders <small style="color:var(--muted)">(auth)</small></button>
          <button class="preset-btn" onclick="loadPreset('GET','/api/internal/admin/dashboard','')"><span class="method GET">GET</span>/api/internal/admin/dashboard <small style="color:var(--muted)">(admin)</small></button>
          <button class="preset-btn" onclick="loadPreset('DELETE','/api/internal/admin/user/42','')"><span class="method DELETE">DEL</span>/api/internal/admin/user/42</button>
          <div style="font-size:.72rem; color:var(--muted); font-weight:600; margin-top:8px;">🌐 EXTERNAL (proxied)</div>
          <button class="preset-btn" onclick="loadPreset('GET','/api/external/posts','')"><span class="method GET">GET</span>/api/external/posts</button>
          <button class="preset-btn" onclick="loadPreset('GET','/api/external/users','')"><span class="method GET">GET</span>/api/external/users</button>
          <button class="preset-btn" onclick="loadPreset('GET','/api/external/comments','')"><span class="method GET">GET</span>/api/external/comments</button>
          <button class="preset-btn" onclick="loadPreset('GET','/api/external/store/products','')"><span class="method GET">GET</span>/api/external/store/products</button>
        </div>
      </div>

      <!-- Request builder -->
      <div class="panel">
        <div class="panel-title">🔧 Request Builder</div>
        <div>
          <label>Method</label>
          <select id="method">
            <option>GET</option><option>POST</option><option>PUT</option>
            <option>DELETE</option><option>PATCH</option>
          </select>
        </div>
        <div>
          <label>URL / Path</label>
          <input type="text" id="url" value="/api/internal/products">
        </div>
        <div>
          <label>Authorization Token (JWT)</label>
          <input type="text" id="token" placeholder="Paste JWT or leave empty">
        </div>
        <div>
          <label>Request Body (JSON)</label>
          <textarea id="body" placeholder='{"key": "value"}'></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendRequest()">▶ Send Request</button>
      </div>

      <!-- Auth helper -->
      <div class="panel">
        <div class="panel-title">🔑 Quick Auth</div>
        <button class="preset-btn" onclick="fetchToken('admin','Admin@123')"><span class="method POST">POST</span>Login as Admin</button>
        <button class="preset-btn" onclick="fetchToken('viewer','Viewer@123')"><span class="method POST">POST</span>Login as Viewer</button>
        <div id="tokenInfo" style="font-size:.72rem; color:var(--muted); font-family:var(--mono); word-break:break-all; padding:6px; background:var(--surf); border-radius:6px; display:none;"></div>
      </div>
    </div>

    <!-- RIGHT: Response -->
    <div class="right">
      <div class="response-header">
        <span style="font-size:.85rem; font-weight:700;">Response</span>
        <div class="resp-meta">
          <span class="status-badge" id="statusBadge">—</span>
          <span class="latency" id="latencyBadge">—</span>
          <button class="clear-btn" onclick="clearResp()">⌫ Clear</button>
        </div>
      </div>
      <div class="response-body" id="responseBody">
        <div class="resp-placeholder">Select a route or build a request and click ▶ Send</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Auth Enforcement ────────────────────────────────────────────────────────
if (!sessionStorage.getItem('jwt')) {
  window.location.href = '/login/';
}

window.logout = function() {
  sessionStorage.clear();
  window.location.href = '/login/';
};

window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('jwt');
  if (saved) document.getElementById('token').value = saved;
  
  const username = sessionStorage.getItem('username') || 'Guest';
  const role = sessionStorage.getItem('role') || 'viewer';
  const ti = document.getElementById('tokenInfo');
  if (ti && saved) {
    ti.style.display = 'block';
    ti.textContent = `✅ Logged in as ${username} (${role})`;
  }
});

function loadPreset(method, url, body) {
  document.getElementById('method').value = method;
  document.getElementById('url').value    = url;
  document.getElementById('body').value   = body;
}

async function fetchToken(username, password) {
  try {
    const r = await fetch('/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (d.token) {
      document.getElementById('token').value = d.token;
      sessionStorage.setItem('jwt', d.token);
      const ti = document.getElementById('tokenInfo');
      ti.style.display = 'block';
      ti.textContent = `✅ Logged in as ${d.username} (${d.role})\n${d.token.substring(0,60)}…`;
    }
  } catch(e) { alert('Login failed: ' + e.message); }
}

async function sendRequest() {
  const method = document.getElementById('method').value;
  const url    = document.getElementById('url').value.trim();
  const token  = document.getElementById('token').value.trim();
  const body   = document.getElementById('body').value.trim();
  const btn    = document.getElementById('sendBtn');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending…';
  document.getElementById('responseBody').innerHTML = '<span style="color:var(--muted)">Waiting…</span>';

  const t0 = Date.now();
  try {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
      }
    };
    if (body && method !== 'GET') {
      try { opts.body = JSON.stringify(JSON.parse(body)); } catch { opts.body = body; }
    }
    const r = await fetch(url, opts);
    const latency = Date.now() - t0;
    const text = await r.text();
    let parsed;
    try { parsed = JSON.parse(text); } catch { parsed = text; }
    renderResponse(r.status, latency, parsed);
  } catch(e) {
    renderResponse(0, Date.now() - t0, { error: e.message });
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Send Request';
  }
}

function renderResponse(status, latency, data) {
  const badge = document.getElementById('statusBadge');
  badge.textContent = status || 'ERR';
  badge.className = `status-badge ${status >= 200 && status < 300 ? 'ok' : status >= 400 ? 'err' : 'warn'}`;
  document.getElementById('latencyBadge').textContent = `${latency}ms`;

  const html = typeof data === 'string' ? escapeHtml(data) : syntaxHighlight(data);
  document.getElementById('responseBody').innerHTML = html;
}

function syntaxHighlight(json) {
  const str = JSON.stringify(json, null, 2);
  return str.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
    let cls = 'j-num';
    if (/^"/.test(match))      cls = /:$/.test(match) ? 'j-key' : 'j-str';
    else if (/true|false/.test(match)) cls = 'j-bool';
    else if (/null/.test(match))       cls = 'j-null';
    return `<span class="${cls}">${escapeHtml(match)}</span>`;
  });
}
function escapeHtml(str) { return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function clearResp() {
  document.getElementById('responseBody').innerHTML = '<div class="resp-placeholder">Cleared</div>';
  document.getElementById('statusBadge').textContent = '—';
  document.getElementById('latencyBadge').textContent = '—';
}
</script>
</body>
</html>
